<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Akaunting - Offline</title>
    <style>
        :root {
            --bg: #f4f7fb;
            --card: #ffffff;
            --text: #1f2937;
            --muted: #6b7280;
            --accent: #3b82f6;
            --border: #e5e7eb;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            color: var(--text);
            background: radial-gradient(circle at top, #ffffff 0%, var(--bg) 55%);
            display: grid;
            place-items: center;
            padding: 24px;
        }

        .card {
            width: 100%;
            max-width: 560px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 8px 28px rgba(15, 23, 42, 0.08);
        }

        h1 {
            margin: 0 0 10px;
            font-size: 1.5rem;
            line-height: 1.2;
        }

        p {
            margin: 0;
            color: var(--muted);
            line-height: 1.6;
        }

        .actions {
            margin-top: 18px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        button {
            border: none;
            border-radius: 10px;
            padding: 10px 14px;
            background: var(--accent);
            color: #fff;
            font-size: 0.95rem;
            cursor: pointer;
        }

        small {
            display: block;
            margin-top: 14px;
            color: var(--muted);
        }
    </style>
</head>
<body>
    <main class="card">
        <h1>You are offline</h1>
        <p>
            Akaunting cannot reach the network right now. Please check your connection and try again.
        </p>
        <div class="actions">
            <button type="button" onclick="location.reload()">Try again</button>
        </div>
        <small>This page is served by your PWA cache.</small>
    </main>
</body>
</html>
